worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    upstream smartclean_api {
        server api:8080;
        keepalive 16;
    }

    server {
        listen 80;
        server_name smartclean.com.ua www.smartclean.com.ua localhost 127.0.0.1;

        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://smartclean_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /robots.txt {
            access_log off;
        }

        location = /sitemap.xml {
            access_log off;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
